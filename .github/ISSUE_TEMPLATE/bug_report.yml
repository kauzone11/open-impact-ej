name: Relatar problema
description: Informe uma falha reproduzível no Open Impact EJ.
title: "[Bug]: "
labels: [bug]
body:
  - type: dropdown
    id: module
    attributes:
      label: Módulo afetado
      options: [Início, Diretorias, Projetos, Tarefas, Agenda e reuniões, Disponibilidade, Finanças, Pessoas e convites, Ajustes, Notificações e busca, Autenticação]
    validations: { required: true }
  - type: textarea
    id: reproduction
    attributes: { label: Como reproduzir }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Resultado esperado }
    validations: { required: true }
  - type: textarea
    id: actual
    attributes: { label: Resultado atual }
    validations: { required: true }
  - type: input
    id: browser
    attributes: { label: Navegador e sistema }
  - type: input
    id: version
    attributes: { label: Versão ou commit }
  - type: textarea
    id: logs
    attributes: { label: Logs sem segredos, description: Remova tokens, cookies, senhas e dados pessoais. }
