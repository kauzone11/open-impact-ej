name: Sugerir funcionalidade
description: Proponha uma melhoria para a gestão da EJ.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes: { label: Problema de gestão }
    validations: { required: true }
  - type: textarea
    id: users
    attributes: { label: Pessoas afetadas }
    validations: { required: true }
  - type: textarea
    id: behavior
    attributes: { label: Comportamento proposto }
    validations: { required: true }
  - type: textarea
    id: alternatives
    attributes: { label: Alternativas consideradas }
  - type: textarea
    id: tenancy
    attributes: { label: Impacto em tenant e permissões }
    validations: { required: true }
