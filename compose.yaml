services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: open_impact_ej
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - open_impact_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d open_impact_ej"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  open_impact_postgres:
